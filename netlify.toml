# Netlify config for the Next.js app.
# The official Next.js runtime (@netlify/plugin-nextjs) is auto-installed by
# Netlify — it handles SSR, ISR, route handlers, and the publish dir for you.

[build]
  command = "npm run build"

[build.environment]
  # Next.js 16 needs a modern Node. (Don't rely on Netlify's default.)
  NODE_VERSION = "22"
